<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <title>服务状态 | 终末地抽卡分析器</title>
    <meta
      name="description"
      content="公开查看终末地抽卡分析器的主站、公开数据、邮件、导入和验证服务状态。"
    />
    <link rel="stylesheet" href="./styles.css" />
    <script>
      window.STATUS_PAGE_CONFIG = {
        endpoint: 'https://ef-gacha.mogujun.icu/api/site-status',
        homeUrl: 'https://ef-gacha.mogujun.icu/',
      };
    </script>
  </head>
  <body>
    <main class="shell">
      <header class="hero">
        <div>
          <a class="back-link" id="home-link" href="https://ef-gacha.mogujun.icu/">返回主站</a>
          <h1>服务状态</h1>
          <p>
            公开查看主站、公开数据、公共统计、邮件通知、数据导入和验证服务是否大体可用。
          </p>
        </div>
        <section class="overall" id="overall-card" aria-live="polite">
          <span class="status-dot status-unknown"></span>
          <div>
            <strong id="overall-label">正在检查</strong>
            <span id="overall-time">最近检查：--</span>
          </div>
        </section>
      </header>

      <section class="notice">
        本页面只展示公开服务摘要，不展示内部接口、用户数量、邮箱、Token、数据库细节或供应商私密配置。
      </section>

      <section class="toolbar">
        <button id="refresh-button" type="button">刷新</button>
        <span id="endpoint-label"></span>
      </section>

      <section class="error" id="error-card" hidden>
        <strong>状态页读取失败</strong>
        <p id="error-message">状态接口没有正常响应。</p>
      </section>

      <section class="summary-grid" aria-label="状态摘要">
        <article>
          <span>最近检查</span>
          <strong id="checked-at">--</strong>
        </article>
        <article>
          <span>受影响服务</span>
          <strong id="affected-count">0</strong>
        </article>
        <article>
          <span>缓存版本</span>
          <strong id="cache-version">0</strong>
        </article>
      </section>

      <section class="service-list" id="service-list" aria-label="服务列表"></section>

      <section class="incidents">
        <h2>受影响服务</h2>
        <div id="incident-list">当前没有公开故障记录。</div>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
