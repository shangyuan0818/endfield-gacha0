<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Roboto+Mono:wght@500;700&display=swap');

    body {
      margin: 0;
      padding: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background-color: #f1f5f9;
      line-height: 1.6;
    }

    .email-container {
      max-width: 600px;
      margin: 40px auto;
      background: #ffffff;
      border: 1px solid #e2e8f0;
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #18181b 0%, #27272a 100%);
      padding: 40px 30px;
      position: relative;
      border-bottom: 4px solid #fbbf24;
    }

    .header-bg {
      position: absolute;
      inset: 0;
      opacity: 0.08;
      background-image:
        linear-gradient(rgba(255,255,255,0.1) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.1) 1px, transparent 1px);
      background-size: 20px 20px;
    }

    .logo-box {
      width: 50px;
      height: 50px;
      background: #fbbf24;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
    }

    .logo-text {
      font-family: 'Roboto Mono', monospace;
      font-size: 24px;
      font-weight: 700;
      color: #000;
    }

    .header-title {
      font-family: 'Roboto Mono', monospace;
      font-size: 24px;
      font-weight: 700;
      color: #ffffff;
      margin: 0 0 8px 0;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .header-subtitle {
      font-size: 12px;
      color: #a1a1aa;
      margin: 0;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .content {
      padding: 40px 30px;
      color: #1e293b;
    }

    .greeting {
      font-size: 18px;
      font-weight: 600;
      color: #0f172a;
      margin: 0 0 20px 0;
    }

    .message {
      font-size: 15px;
      color: #475569;
      margin: 0 0 30px 0;
    }

    .cta-button {
      display: inline-block;
      background: #fbbf24;
      color: #000;
      text-decoration: none;
      padding: 16px 40px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-size: 14px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      transition: all 0.2s;
    }

    .cta-button:hover {
      background: #fcd34d;
    }

    .info-box {
      background: #f8fafc;
      border-left: 4px solid #fbbf24;
      padding: 20px;
      margin: 30px 0;
    }

    .info-box p {
      margin: 0;
      font-size: 14px;
      color: #64748b;
    }

    .footer {
      background: #f8fafc;
      padding: 30px;
      text-align: center;
      border-top: 1px solid #e2e8f0;
    }

    .footer-text {
      font-size: 13px;
      color: #94a3b8;
      margin: 5px 0;
    }

    .footer-link {
      color: #fbbf24;
      text-decoration: none;
      font-weight: 600;
    }

    .divider {
      height: 2px;
      background: linear-gradient(90deg, transparent, #e2e8f0, transparent);
      margin: 30px 0;
    }
  </style>
</head>
<body>
  <div class="email-container">
    <!-- Header -->
    <div class="header">
      <div class="header-bg"></div>
      <div style="position: relative; z-index: 1;">
        <div class="logo-box">
          <span class="logo-text">EF</span>
        </div>
        <h1 class="header-title">VERIFY EMAIL</h1>
        <p class="header-subtitle">验证您的邮箱地址</p>
      </div>
    </div>

    <!-- Content -->
    <div class="content">
      <p class="greeting">管理员，您好！</p>

      <p class="message">
        欢迎加入<strong>终末地抽卡分析器</strong>！我们需要验证您的邮箱地址以确保账户安全。
      </p>

      <p class="message">
        点击下方按钮完成邮箱验证：
      </p>

      <div style="text-align: center; margin: 40px 0;">
        <a href="{{ .ConfirmationURL }}" class="cta-button">
          立即验证邮箱
        </a>
      </div>

      <div class="info-box">
        <p>
          <strong>⚠️ 安全提示：</strong><br>
          如果您没有注册过此账户，请忽略此邮件。验证链接将在 24 小时后失效。
        </p>
      </div>

      <div class="divider"></div>

      <p class="message" style="font-size: 13px; color: #94a3b8;">
        如果按钮无法点击，请复制以下链接到浏览器中打开：<br>
        <a href="{{ .ConfirmationURL }}" style="color: #fbbf24; word-break: break-all;">{{ .ConfirmationURL }}</a>
      </p>
    </div>

    <!-- Footer -->
    <div class="footer">
      <p class="footer-text">© 2025 终末地抽卡分析器</p>
      <p class="footer-text">Endfield Gacha Analyzer</p>
      <p class="footer-text" style="margin-top: 15px;">
        <a href="#" class="footer-link">使用帮助</a> ·
        <a href="#" class="footer-link">隐私政策</a> ·
        <a href="#" class="footer-link">联系我们</a>
      </p>
    </div>
  </div>
</body>
</html>
