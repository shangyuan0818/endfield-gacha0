version: '3.8'

services:
  # 后端 API 服务
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: endfield-backend
    restart: always
    ports:
      - "3001:3001"
    environment:
      # 服务端口
      - PORT=3001
      # 允许的跨域来源（前端域名）
      - ALLOWED_ORIGINS=https://endfield.15963574.xyz
      # Node 环境
      - NODE_ENV=production
    # 健康检查
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # 日志配置（防止日志文件过大）
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    # 资源限制（可选，根据实际情况调整）
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    networks:
      - endfield-network

# 网络配置
networks:
  endfield-network:
    driver: bridge
    name: endfield-network
