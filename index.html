<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="description" content="终末地抽卡分析器 - 《明日方舟：终末地》抽卡记录分析工具，支持云端同步和多用户协作" />
    <meta name="keywords" content="明日方舟,终末地,Endfield,抽卡,分析器,保底,概率" />
    <title>Endfield Gacha Analyzer | 终末地抽卡分析器</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function installEarlyCrashFallback() {
        var fatalPatterns = [
          'chunkloaderror',
          'failed to fetch dynamically imported module',
          'importing a module script failed',
          'module script',
          'cannot read properties of undefined',
          "can't access property",
          'forwardref',
          '/assets/'
        ];

        function normalize(event) {
          var source = event && (event.reason || event.error) || event || {};
          return {
            message: event && event.message || source.message || String(source || 'Unknown runtime error'),
            filename: event && event.filename || source.filename || '',
            stack: source.stack || ''
          };
        }

        function isFatal(details) {
          var haystack = [
            details.message,
            details.filename,
            details.stack
          ].join('\n').toLowerCase();
          return fatalPatterns.some(function(pattern) {
            return haystack.indexOf(pattern) >= 0;
          });
        }

        function appendText(parent, tagName, text, style) {
          var node = document.createElement(tagName);
          node.textContent = text;
          if (style) {
            node.style.cssText = style;
          }
          parent.appendChild(node);
          return node;
        }

        function render(event) {
          var root = document.getElementById('root');
          if (!root || root.dataset.crashFallbackRendered === 'true' || root.childElementCount > 0) {
            return;
          }

          var details = normalize(event);
          if (!isFatal(details)) {
            return;
          }

          root.dataset.crashFallbackRendered = 'true';
          root.replaceChildren();

          var page = document.createElement('main');
          page.style.cssText = 'min-height:100vh;background:#050506;color:#f4f4f5;display:flex;align-items:center;justify-content:center;padding:32px 16px;box-sizing:border-box;font-family:HarmonyOS Sans SC,HarmonyOS Sans,Microsoft YaHei,sans-serif;';

          var panel = document.createElement('section');
          panel.style.cssText = 'width:min(720px,100%);background:rgba(24,24,27,.95);border:1px solid rgba(250,204,21,.45);padding:28px;box-sizing:border-box;box-shadow:0 24px 80px rgba(0,0,0,.55);';

          appendText(panel, 'p', 'ENDFIELD GACHA ANALYZER', 'color:#facc15;font-size:12px;font-weight:900;letter-spacing:.32em;margin:0 0 12px;');
          appendText(panel, 'h1', '应用资源加载失败', 'font-size:clamp(28px,6vw,46px);line-height:1;margin:0 0 12px;font-weight:900;');
          appendText(panel, 'p', '页面入口脚本在 React 启动前发生错误。请先刷新页面；如果仍然复现，请复制下面的错误信息反馈给管理员。', 'color:#a1a1aa;font-size:14px;line-height:1.8;margin:0 0 20px;');
          appendText(panel, 'pre', [
            'message: ' + details.message,
            'file: ' + (details.filename || 'not provided'),
            'route: ' + window.location.href
          ].join('\n'), 'white-space:pre-wrap;word-break:break-word;background:#09090b;border:1px solid rgba(113,113,122,.4);color:#e4e4e7;font-size:12px;line-height:1.6;padding:14px;margin:0 0 18px;');

          var button = document.createElement('button');
          button.type = 'button';
          button.textContent = '刷新页面';
          button.style.cssText = 'border:1px solid rgba(250,204,21,.45);border-radius:0;background:#facc15;color:#050505;cursor:pointer;font-size:13px;font-weight:900;letter-spacing:.04em;padding:10px 14px;';
          button.addEventListener('click', function() {
            window.location.reload();
          });

          panel.appendChild(button);
          page.appendChild(panel);
          root.appendChild(page);
        }

        window.__ENDGA_EARLY_CRASH_FALLBACK__ = render;
        window.addEventListener('error', render);
        window.addEventListener('unhandledrejection', render);
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
